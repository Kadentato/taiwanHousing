name: Deploy site to GitHub Pages

# Auto-publish the static webApp/ folder on every push to main (or on manual run).
# Updating the live site = commit + push (or edit a file in the GitHub web UI).
on:
  push:
    branches: [main]
    paths: ["webApp/**", ".github/workflows/deploy.yml"]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; let the newest win.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: webApp          # publish only the static site folder
      - id: deployment
        uses: actions/deploy-pages@v4
